       注意：签名使用的是【公众号/服务号】的 AppID + AppSecret，而非移动应用的。 -->
  <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;

    .card-tag {
      display: flex;

    .btn-join:active { opacity: 0.9; }

    /* 微信开放标签包裹容器：普通块级区域，居中显示，仅在微信内展示 */
    #openTagWrapper {
      margin: 24px auto 0;
      text-align: center;
    }

    /* 页面底部日志面板（已注释掉）

    */

<body>
  <h1 class="page-title">共同计划事项提醒</h1>
  <div class="card-wrap">
    <div class="card-inner">
      <!-- 与 App 一致：assets/icons/share_default.png，部署时请将该图放在同目录或同源下 -->
      <img id="cardImg" src="share_default.png" alt="分享卡片" />
      <div class="card-text">
        <div class="card-tag">
          <div class="card-tag-dot"></div>
          <span id="cardTag">重要时刻</span>
        </div>
        <div class="card-subtitle" id="cardSubtitle">共同待办事项</div>
        <div class="card-spacer"></div>
        <div class="card-title" id="cardTitle">去考托福雅思考试还有</div>
        <div class="card-main" id="cardMain">18天</div>
        <div class="card-datetime" id="cardDatetime">2026-02-17 星期二 24:00</div>
      </div>
    </div>
  </div>
  <div class="card-desc">共同待办事项，多人一起提醒，一起出发，有陪伴共同出发。</div>

  <!--
    微信内：使用官方「唤起 App」组件 wx-open-launch-app，参数通过 extinfo 传递，App 端通过 fluwx.getExtMsg() 获取并展示分享页。
    非微信环境：隐藏开放标签区域，使用普通按钮 + 通用链接/App Links 方案。
  -->
  <div id="openTagWrapper">
    <!-- 微信唤起 App 组件：appid 必须为【移动应用】AppID；extinfo 由 JS 动态写入，携带 scene/title/mainText/date 等，App 用 fluwx.getExtMsg() 解析 -->
    <wx-open-launch-app
      id="wxOpenLaunchApp"
      appid="wxbd63620e37fab476"
      extinfo="">
      <script type="text/wxtag-template">
        <style>
          .btn-join {
            display: block;
            width: 100%;
            max-width: 320px;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 500;
            color: #fff;
            background: #c4a35a;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            font-family: inherit;
            margin: 24px auto 0;
          }
          .btn-join:active { opacity: 0.9; }
        </style>
        <button class="btn-join">加入计划事项</button>
      </script>
    </wx-open-launch-app>
  </div>

  <!-- 非微信 / 开放标签不可用时的兜底按钮（默认隐藏，由 JS 决定是否展示） -->
  <button class="btn-join" id="btnJoinFallback" style="display:none;">加入计划事项</button>

  <script>
    (function() {
      // 从 URL 读取与 App 构造参数一致的 title、mainText、date、time、tag、subtitle
      function getQuery(name) {
        var m = new RegExp('([?&])' + name + '=([^&]*)').exec(location.search);
        return m ? decodeURIComponent(m[2]) : '';
      }

      // 解析 query 或 hash 中的 key=value&key2=value2 形式字符串
      function parseParamString(str) {
        var obj = {};
        if (!str) return obj;
        var parts = str.split('&');
        for (var i = 0; i < parts.length; i++) {
          var kv = parts[i];
          if (!kv) continue;
          var idx = kv.indexOf('=');
          var key, value;
          if (idx === -1) {
            key = decodeURIComponent(kv);
            value = '';
          } else {
            key = decodeURIComponent(kv.slice(0, idx));
            value = decodeURIComponent(kv.slice(idx + 1));
          }
          if (!key) continue;
          obj[key] = value;
        }
        return obj;
      }

      // 解析 URL 上的全部参数（query + hash）：
      // - query: 只包含基础展示 & 分享人参数（title/mainText/...）
      // - hash: Flutter 侧通过 fragment 传入的 daily_tasks / habit_tasks 完整字段快照
      // 最终 allQueryParams = queryParams ∪ hashParams（query 优先）
      function getAllQueryParams() {
        var search = location.search || '';
        if (search && search.charAt(0) === '?') search = search.slice(1);
        var queryParams = parseParamString(search);

        var hash = location.hash || '';
        if (hash && hash.charAt(0) === '#') hash = hash.slice(1);
        var hashParams = parseParamString(hash);

        var merged = {};
        // 先放 query（基础字段）
        for (var k in queryParams) {
          if (!Object.prototype.hasOwnProperty.call(queryParams, k)) continue;
          merged[k] = queryParams[k];
        }
        // 再合并 hash 中的任务表字段（不覆盖 query）
        for (var k2 in hashParams) {
          if (!Object.prototype.hasOwnProperty.call(hashParams, k2)) continue;
          if (merged.hasOwnProperty(k2)) continue;
          merged[k2] = hashParams[k2];
        }
        // console.log('[h5] allQueryParams (merged from search & hash):', merged);
        return merged;
      }
      var allQueryParams = getAllQueryParams();
      // console.log('[h5] raw location', {
      //   href: location.href,
      //   search: location.search,
      //   hash: location.hash,
      // });

      var title = getQuery('title') || '去考托福雅思考试还有';
      var mainText = getQuery('mainText') || '18天';
      var date = getQuery('date') || '2026-02-17 星期二';
      // 不再在H5端默认补 24:00，避免覆盖 App / 数据库中的真实时间；
      // 若需要展示具体时间，由 App 在生成分享链接时显式传入 time 参数。
      var timeRaw = getQuery('time');
      var time = timeRaw || '';
      // console.log('[h5] parsed initial params', {
      //   title: title,
      //   mainText: mainText,
      //   date: date,
      //   timeRaw: timeRaw,
      //   timeFinal: time,
      //   taskId: taskId,
      //   taskType: taskType,
      // });
      var tag = getQuery('tag') || '重要时刻';
      var subtitle = getQuery('subtitle') || title;
      var sharerName = getQuery('sharerName') || '';
      var sharerId = getQuery('sharerId') || '';
      var sharerAvatar = getQuery('sharerAvatar') || '';
      var taskId = getQuery('taskId') || '';
      var taskType = getQuery('taskType') || '';

      document.getElementById('cardTag').textContent = tag;
      document.getElementById('cardSubtitle').textContent = subtitle;
      document.getElementById('cardTitle').textContent = title;
      document.getElementById('cardMain').textContent = mainText;
      document.getElementById('cardMain').className = 'card-main ' + (/^\d+\s*天$/.test(mainText) ? '' : 'small-only');
      document.getElementById('cardDatetime').textContent = time ? date + ' ' + time : date;

      // 若部署在不同路径，可设置图片基础路径，例如: var imgBase = 'https://wxh5.vercel.app/';
      var imgSrc = getQuery('img') || 'share_default.png';
      document.getElementById('cardImg').src = imgSrc;

      // 通用链接 / App Links 唤端地址：与 iOS Associated Domains、Android App Links、
      // 以及 Flutter 中 AppConstants.shareLandingPageBaseUrl 保持完全一致
      var APP_UNIVERSAL_LINK = 'https://www.haloutongxue.com/h5/';

      var ua = navigator.userAgent || '';
      var isIOS = /iPhone|iPad|iPod/i.test(ua);
      var isAndroid = /Android/i.test(ua);
      var isWeChat = /MicroMessenger/i.test(ua);

      // 签名接口：
      // - 默认走同源 nginx 代理：/functions/v1/wechat-js-sdk-signature
      //   由 nginx 转发到 company 项目的 Next.js 接口 http://localhost:3000/api/wechat-js-sdk-signature
      // - 如需直连 Supabase，可在页面上通过 window.WECHAT_SIGN_API 覆盖
      var WECHAT_SIGN_API = window.WECHAT_SIGN_API ||
        '/functions/v1/wechat-js-sdk-signature';

      // ---------- 微信 JS-SDK 初始化（用于支持 <wx-open-launch-app> 等开放标签） ----------
      function initWeChatJSSDK() {
        if (!isWeChat || typeof wx === 'undefined') {
          return;
        }

        var currentUrl = location.href.split('#')[0];
        // console.log('[wx] sign request url:', WECHAT_SIGN_API, 'page url:', currentUrl);

        fetch(WECHAT_SIGN_API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: currentUrl }),
        })
        .then(function (res) {
          // console.log('[wx] sign response status:', res.status);
          return res.json();
        })
        .then(function (data) {
          if (!data || !data.appId) {
            // console.error('[wx] invalid sign response', data);
            return;
          }
          // console.log('[wx] sign ok, appId:', data.appId);

          wx.config({
            debug: false,
            appId: data.appId,
            timestamp: data.timestamp,
            nonceStr: data.nonceStr,
            signature: data.signature,
            jsApiList: [],
            openTagList: ['wx-open-launch-app'],
          });

          wx.ready(function () {
            // 仅记录 config 成功，开放标签由微信自行渲染
            // console.log('[wx] ready');
          });

          wx.error(function (err) {
            // console.error('[wx] config error', err);
            // 微信内强制使用开放标签；不再回退到兜底按钮
          });
        })
        .catch(function (err) {
          // console.error('[wx] sign request error', err);
          // 微信内强制使用开放标签；不再回退到兜底按钮
        });
      }

      // 将日常/习惯任务的完整字段追加到参数列表中（排除 created_at/updated_at），仅用于 extinfo
      function appendTaskDetailParams(params) {
        if (!taskType) return;
        // 仅在日常/习惯任务时追加
        if (taskType !== 'daily' && taskType !== 'habit') return;

        // 已经在 extinfo/universal link 中显式传递的字段，避免重复
        var reserved = {
          scene: true,
          title: true,
          mainText: true,
          date: true,
          time: true,
          tag: true,
          subtitle: true,
          sharerName: true,
          sharerId: true,
          sharerAvatar: true,
          taskId: true,
          taskType: true,
          img: true
        };

        for (var key in allQueryParams) {
          if (!Object.prototype.hasOwnProperty.call(allQueryParams, key)) continue;
          if (reserved[key]) continue;
          var lowerKey = String(key).toLowerCase();
          if (lowerKey === 'created_at' || lowerKey === 'updated_at') continue;
          var val = allQueryParams[key];
          if (val === undefined || val === null || val === '') continue;
          params.push(encodeURIComponent(key) + '=' + encodeURIComponent(val));
        }
      }

      function buildExtInfo() {
        // extinfo 建议保持短小，避免过长导致开放标签拉起失败；scene=share_join 表示从「加入计划事项」唤起，App 展示确认加入页
        var params = [];
        params.push('scene=share_join');
        params.push('title=' + encodeURIComponent(title));
        params.push('mainText=' + encodeURIComponent(mainText));
        params.push('date=' + encodeURIComponent(date));
        if (time) params.push('time=' + encodeURIComponent(time));
        params.push('tag=' + encodeURIComponent(tag));
        params.push('subtitle=' + encodeURIComponent(subtitle));
        if (sharerName) params.push('sharerName=' + encodeURIComponent(sharerName));
        if (sharerId) params.push('sharerId=' + encodeURIComponent(sharerId));
        if (sharerAvatar) params.push('sharerAvatar=' + encodeURIComponent(sharerAvatar));
        if (taskId) params.push('taskId=' + encodeURIComponent(taskId));
        if (taskType) params.push('taskType=' + encodeURIComponent(taskType));

        // 日常/习惯任务：把 URL 上携带的任务字段完整追加到 extinfo
        appendTaskDetailParams(params);
        var s = params.join('&');
        // console.log('[h5] buildExtInfo before limit', {
        //   params: params,
        //   length: s.length,
        //   content: s,
        // });

        // 注意：不能用 slice 硬截断，否则可能把 %E4... 这种编码切一半，App 侧 Uri.tryParse 会失败，导致 extinfo 似乎“没传过来”
        // 尽量放宽上限到 2048，仅当超长时按“完整参数”裁剪（从末尾移除），保证每个 key=value 结构完整
        var MAX_LEN = 2048;
        var removed = 0;
        while (s.length > MAX_LEN && params.length > 0) {
          params.pop();
          removed++;
          s = params.join('&');
        }
        if (removed > 0) {
          // console.log('[h5] buildExtInfo exceeded max, removed tail params', {
          //   removed: removed,
          //   length: s.length,
          // });
        }
        // console.log('[h5] buildExtInfo final', { length: s.length, content: s });
        return s;
      }

      function buildAppOpenUrl() {
        // 与 App 端 ShareJoinConfirmPage.fromUri 保持一致，把当前文案与分享人透传给 App；scene=share_join 表示从「加入计划事项」唤起
        var base = APP_UNIVERSAL_LINK.replace(/[#?].*$/, '');
        var params = [];
        params.push('scene=share_join');
        params.push('title=' + encodeURIComponent(title));
        params.push('mainText=' + encodeURIComponent(mainText));
        params.push('date=' + encodeURIComponent(date));
        if (time) {
          params.push('time=' + encodeURIComponent(time));
        }
        params.push('tag=' + encodeURIComponent(tag));
        params.push('subtitle=' + encodeURIComponent(subtitle));
        if (sharerName) params.push('sharerName=' + encodeURIComponent(sharerName));
        if (sharerId) params.push('sharerId=' + encodeURIComponent(sharerId));
        if (sharerAvatar) params.push('sharerAvatar=' + encodeURIComponent(sharerAvatar));
        if (taskId) params.push('taskId=' + encodeURIComponent(taskId));
        if (taskType) params.push('taskType=' + encodeURIComponent(taskType));

        var fullUrl = base + '?' + params.join('&');
        // console.log('[h5] buildAppOpenUrl:', {
        //   base: base,
        //   fullUrl: fullUrl,
        //   params: params,
        //   title: title,
        //   mainText: mainText,
        //   date: date,
        //   time: time,
        //   tag: tag,
        //   subtitle: subtitle,
        //   taskId: taskId,
        //   taskType: taskType,
        // });
        return fullUrl;
      }

      function joinPlan() {
        // console.log('[h5] joinPlan click', {
        //   ua: ua,
        //   isWeChat: isWeChat
        // });
        var appUrl = buildAppOpenUrl();
        // console.log('[h5] joinPlan try open app via universal link', {
        //   appUrl: appUrl,
        //   isWeChat: isWeChat
        // });
        var startTs = Date.now();
        var stillHereTimer = setTimeout(function () {
          // 如果 1.5 秒后 H5 仍然存活，极大概率是没有成功唤起 App（或用户手动返回）
          // console.log('[h5] joinPlan maybe not opened app (still on H5 after 1500ms)', {
          //   sinceClickMs: Date.now() - startTs,
          //   isWeChat: isWeChat
          // });
        }, 5500);
        try {
          window.location.href = appUrl;
        } catch (e) {
          clearTimeout(stillHereTimer);
          // console.error('[h5] joinPlan location.href error', e);
        }
      }

      var openTagWrapper = document.getElementById('openTagWrapper');
      var btnJoinFallback = document.getElementById('btnJoinFallback');
      var wxOpenLaunchAppEl = document.getElementById('wxOpenLaunchApp');

      function logOpenTagState(reason) {
        try {
          var el = document.getElementById('wxOpenLaunchApp');
          var wrapper = document.getElementById('openTagWrapper');
          // console.log('[wx] open-tag state', {
          //   reason: reason || '',
          //   isWeChat: isWeChat,
          //   userAgent: ua,
          //   wxOpenLaunchAppExists: !!el,
          //   wxOpenLaunchAppTag: el && el.tagName,
          //   openTagWrapperExists: !!wrapper,
          //   openTagWrapperDisplay: wrapper && wrapper.style && wrapper.style.display,
          //   openTagWrapperChildren: wrapper && wrapper.children && wrapper.children.length
          // });
        } catch (e) {
          // console.error('[wx] logOpenTagState error', e);
        }
      }

      // console.log('[wx] env info', {
      //   ua: ua,
      //   isWeChat: isWeChat,
      //   isIOS: isIOS,
      //   isAndroid: isAndroid,
      // });
      // console.log('[wx] wxOpenLaunchAppEl exists', !!wxOpenLaunchAppEl, wxOpenLaunchAppEl && wxOpenLaunchAppEl.tagName);
      // 首屏时记录一次开放标签状态
      logOpenTagState('dom-ready');
      // 2 秒后再记录一次，看微信是否已将自定义标签替换为真实组件
      setTimeout(function () {
        logOpenTagState('after-2s');
      }, 2000);

      // 初始策略：
      // - 微信内：展示 wx-open-launch-app，参数通过 extinfo 传递，App 用 fluwx.getExtMsg() 获取后展示分享页。
      // - 非微信环境：隐藏开放标签区域，仅使用普通按钮 + Universal Link/App Links。
      if (!isWeChat) {
        if (openTagWrapper) {
          openTagWrapper.style.display = 'none';
          // console.log('[h5] hide openTagWrapper in non-WeChat env');
        }
        if (btnJoinFallback) {
          btnJoinFallback.style.display = 'block';
          btnJoinFallback.onclick = joinPlan;
          // console.log('[h5] btnJoinFallback enabled in non-WeChat env');
        }
      } else {
        if (openTagWrapper) {
          openTagWrapper.style.display = 'block';
          // console.log('[h5] show openTagWrapper in WeChat (extinfo carries params)');
        }
      }

      // 将当前分享参数通过 extinfo 传递给 App（在 DOM 与 WeixinOpenTagsReady 两处设置，确保微信替换组件后仍生效）
      function setExtInfoToOpenTag() {
        var el = document.getElementById('wxOpenLaunchApp');
        if (!el) return;
        try {
          var ext = buildExtInfo();
          // 传递前日志：完整 extinfo 字符串与长度
          // console.log('[share] extinfo 传递前 params (buildExtInfo 结果):', {
          //   length: ext ? ext.length : 0,
          //   content: ext || '',
          //   allQueryParams: allQueryParams,
          // });
          el.setAttribute('extinfo', ext);
          var after = el.getAttribute('extinfo');
          // 传递后日志：写入后读回的 extinfo
          // console.log('[share] extinfo 传递后 (setAttribute 后读回):', {
          //   length: after ? after.length : 0,
          //   content: after || '',
          // });
          // console.log('[wx] set extinfo', ext ? ext.length + ' chars' : 'empty');
        } catch (e) {
          // console.warn('[wx] set extinfo failed', e);
        }
      }
      if (wxOpenLaunchAppEl) setExtInfoToOpenTag();

      // 开放标签无法使用时（如低版本微信/系统）回退，见文档 https://developers.weixin.qq.com/doc/service/guide/h5/opentag.html
      document.addEventListener('WeixinOpenTagsError', function (e) {
        // console.error('[wx] WeixinOpenTagsError', {
        //   errMsg: e.detail && e.detail.errMsg,
        //   detail: e.detail,
        //   ua: ua,
        //   isWeChat: isWeChat,
        // });
        logOpenTagState('WeixinOpenTagsError');
        if (openTagWrapper) openTagWrapper.style.display = 'none';
        if (btnJoinFallback) {
          btnJoinFallback.style.display = 'block';
          btnJoinFallback.onclick = joinPlan;
          // console.log('[h5] btnJoinFallback re-enabled due to WeixinOpenTagsError');
        }
      });

      // 先初始化微信 JS-SDK（页面加载时请求后端签名，供开放标签用）
      initWeChatJSSDK();

      // 兜底按钮已在上面按环境绑定；这里不重复绑定

      // 微信内：必须用「唤起 App 组件」才能唤起 App，普通 location 跳转会被微信拦截。
      function bindWxOpenLaunchAppEvents(el, source) {
        if (!el) {
          // console.warn('[wx] bind wx-open-launch-app events failed, element not found', { source: source });
          return;
        }
        // console.log('[wx] bind wx-open-launch-app events from', source);
        el.addEventListener('launch', function (e) {
          // console.log('[wx] open-launch-app launch success', {
          //   source: source,
          //   detail: e && e.detail,
          // });
        });
        el.addEventListener('error', function (e) {
          var detail = e && e.detail || {};
          var errMsg = detail.errMsg || '';
          // console.log('[wx] open-launch-app error', errMsg, {
          //   source: source,
          //   detail: detail,
          //   ua: ua,
          //   isWeChat: isWeChat,
          // });
          if (String(errMsg).indexOf('fail_check') !== -1) {
            // console.warn('[wx] launch:fail_check 说明微信校验「网页跳转移动应用」未通过，请检查：1) 开放平台-公众号详情-接口信息-网页跳转移动应用 是否已关联本服务号与移动应用；2) Android 包名与签名是否与开放平台一致；3) 是否已安装用正式签名打包的 App。详见 WECHAT_SETUP.md §11');
          }
        });
      }

      if (isWeChat && typeof wx !== 'undefined') {
        // 1）DOM 初始阶段尝试绑定一次（部分环境已经可用）
        bindWxOpenLaunchAppEvents(wxOpenLaunchAppEl, 'dom-ready');
        // 2）等待微信开放标签就绪后再绑定，保证事件一定挂载到微信自定义组件上
        document.addEventListener('WeixinOpenTagsReady', function () {
          // console.log('[wx] WeixinOpenTagsReady fired');
          var el = document.getElementById('wxOpenLaunchApp');
          bindWxOpenLaunchAppEvents(el, 'WeixinOpenTagsReady');
          logOpenTagState('WeixinOpenTagsReady');
          // 开放标签被微信替换为真实组件后再设置一次 extinfo，确保拉起 App 时能带上分享参数
          if (typeof setExtInfoToOpenTag === 'function') setExtInfoToOpenTag();
        });
      }
    })();
  </script>

  <!-- 日志面板与日志 hook（已注释掉）
  <div id="__log_panel__" aria-label="日志">
    <div class="log-header">
      <span class="log-title">调试日志</span>
      <button type="button" class="log-copy-btn" id="__log_copy_btn__">复制</button>
    </div>
    <pre id="__log_panel_body__"></pre>
  </div>
  <script>
    (function () {
      var panel = document.getElementById('__log_panel__');
      var bodyEl = document.getElementById('__log_panel_body__');
      var copyBtn = document.getElementById('__log_copy_btn__');
      if (!panel || !bodyEl) return;

      var LS_KEY = '__H5_DEBUG_LOG__';
      var TTL_MS = 2 * 60 * 1000; // 仅保留最近 2 分钟日志

      // 加载本地已保存的日志内容（跨刷新 / 跨页面返回仍保留）
      try {
        var saved = window.localStorage ? window.localStorage.getItem(LS_KEY) : null;
        if (saved) {
          bodyEl.textContent = saved;
          bodyEl.scrollTop = bodyEl.scrollHeight;
        }
      } catch (e) {}

      function now() {
        try {
          return Date.now();
        } catch (e) {
          return Date.now();
        }
      }

      function safeToString(v) {
        if (typeof v === 'string') return v;
        if (v instanceof Error) return (v.stack || (v.name + ': ' + v.message));
        try {
          return JSON.stringify(v);
        } catch (e) {
          try { return String(v); } catch (e2) { return '[Unserializable]'; }
        }
      }

      function appendLine(level, args) {
        var ts = now();
        var parts = [];
        for (var i = 0; i < args.length; i++) parts.push(safeToString(args[i]));
        var line = '[' + ts + ']' + '[' + level + '] ' + parts.join(' ');

        // 追加到现有文本
        bodyEl.textContent += (bodyEl.textContent ? '\n' : '') + line;

        // 仅保留最近 2 分钟的日志
        try {
          var nowTs = now();
          var lines = bodyEl.textContent.split('\n').filter(Boolean);
          var filtered = [];
          for (var i = 0; i < lines.length; i++) {
            var m = /^\\[(\\d+)\\]/.exec(lines[i]);
            if (!m) continue;
            var t = parseInt(m[1], 10);
            if (!isNaN(t) && nowTs - t <= TTL_MS) {
              filtered.push(lines[i]);
            }
          }
          bodyEl.textContent = filtered.join('\\n');
        } catch (e) {}

        bodyEl.scrollTop = bodyEl.scrollHeight;
        // 持久化到 localStorage，避免刷新 / 返回后日志丢失
        try {
          if (window.localStorage) {
            window.localStorage.setItem(LS_KEY, bodyEl.textContent);
          }
        } catch (e) {}
      }

      function wrapConsole(level) {
        var orig = console[level];
        console[level] = function () {
          try { appendLine(level, arguments); } catch (e) {}
          try { return orig && orig.apply(console, arguments); } catch (e2) {}
        };
      }

      wrapConsole('log');
      wrapConsole('info');
      wrapConsole('warn');
      wrapConsole('error');

      window.addEventListener('error', function (e) {
        var msg = (e && e.message) ? e.message : 'Unknown error';
        var src = (e && e.filename) ? (e.filename + ':' + (e.lineno || 0) + ':' + (e.colno || 0)) : '';
        appendLine('error', [msg, src].filter(Boolean));
      });

      window.addEventListener('unhandledrejection', function (e) {
        appendLine('error', ['UnhandledRejection:', e && e.reason ? e.reason : e]);
      });

      if (copyBtn) {
        copyBtn.addEventListener('click', function () {
          var text = bodyEl.textContent || '';
          if (!text) {
            appendLine('info', ['当前没有可复制的日志']);
            return;
          }
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text)
              .then(function () {
                appendLine('info', ['日志已复制到剪贴板']);
              })
              .catch(function (err) {
                appendLine('error', ['复制失败（clipboard API）', err]);
              });
          } else {
            try {
              var ta = document.createElement('textarea');
              ta.value = text;
              ta.style.position = 'fixed';
              ta.style.left = '-9999px';
              document.body.appendChild(ta);
              ta.focus();
              ta.select();
              var ok = document.execCommand('copy');
              document.body.removeChild(ta);
              if (ok) {
                appendLine('info', ['日志已复制到剪贴板']);
              } else {
                appendLine('error', ['复制失败（execCommand 返回 false）']);
              }
            } catch (e) {
              appendLine('error', ['复制失败（execCommand 异常）', e]);
            }
          }
        });
      }

      appendLine('log', ['log panel ready']);
    })();
  </script>
  -->
