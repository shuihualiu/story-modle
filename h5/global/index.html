<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Plan Together</title>
  <meta name="description" content="Join a shared plan on Plan Together">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Plan Together">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #e5e5e5;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .card-wrap {
      width: 100vw;
      height: 100dvh;
      position: relative;
      background: #fff url("./paper_link.png") center/cover no-repeat;
    }
    .card-inner { position: relative; width: 100%; height: 100%; color: #61596a; }
    .card-inner img {
      width: min(76vw, 300px);
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 256px;
      object-fit: contain;
    }
    .card-title {
      position: absolute;
      left: 16px; right: 16px;
      bottom: 236px;
      text-align: center;
      font-size: 18px;
      font-weight: 500;
      margin: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-title .main-number { font-size: 32px; font-weight: 700; }
    .card-datetime {
      position: absolute;
      left: 16px; right: 16px;
      bottom: 208px;
      text-align: center;
      font-size: 12px;
      color: #8a8a8a;
      margin: 0;
    }
    .btn-join {
      position: fixed;
      left: 50%;
      bottom: 140px;
      transform: translateX(-50%);
      width: 240px;
      height: 50px;
      line-height: 50px;
      font-size: 18px;
      color: #fff;
      background: #0098ff;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-family: inherit;
      z-index: 20;
    }
    .btn-join:active { opacity: 0.9; }
    .hint {
      position: fixed;
      left: 16px; right: 16px;
      bottom: 80px;
      text-align: center;
      font-size: 12px;
      color: #8a8a8a;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="card-wrap">
    <div class="card-inner">
      <img id="illustration" src="./default.png" alt="">
      <p class="card-title" id="headline"></p>
      <p class="card-datetime" id="datetime"></p>
    </div>
  </div>
  <button class="btn-join" id="btnJoin" type="button">Join this plan</button>
  <p class="hint" id="hint"></p>
  <script>
    (function () {
      var CONFIG = {
        iosStore: 'https://apps.apple.com/app/idYOUR_APP_ID',
        androidStore: 'https://play.google.com/store/apps/details?id=com.haloutongxue.reminder',
        officialSite: 'https://global.haloutongxue.com',
        defaultOg: 'https://global.haloutongxue.com/h5/global/default-og.png',
        landingBase: 'https://global.haloutongxue.com/h5/global/index.html'
      };

      function getParams() {
        var params = {};
        var search = window.location.search.replace(/^\?/, '');
        if (!search) return params;
        search.split('&').forEach(function (pair) {
          var idx = pair.indexOf('=');
          if (idx < 0) return;
          var k = decodeURIComponent(pair.slice(0, idx));
          var v = decodeURIComponent(pair.slice(idx + 1));
          params[k] = v;
        });
        var hash = window.location.hash.replace(/^#/, '');
        if (hash) {
          hash.split('&').forEach(function (pair) {
            var idx = pair.indexOf('=');
            if (idx < 0) return;
            var k = decodeURIComponent(pair.slice(0, idx));
            var v = decodeURIComponent(pair.slice(idx + 1));
            if (!params[k]) params[k] = v;
          });
        }
        return params;
      }

      function emphasizeNumbers(text) {
        return text.replace(/(\d+(?:\.\d+)?)/g, '<span class="main-number">$1</span>');
      }

      var q = getParams();
      var title = q.title || 'Plan Together';
      var mainText = q.mainText || '';
      var date = q.date || '';
      var time = q.time || '';
      var img = q.img ? './' + q.img : './default.png';
      var ogImage = q.ogImage || CONFIG.defaultOg;

      document.getElementById('illustration').src = img;
      document.getElementById('headline').innerHTML = emphasizeNumbers(
        (title + (mainText ? ' ' + mainText : '')).trim()
      );
      document.getElementById('datetime').textContent =
        date ? ('- ' + date + (time ? ' ' + time : '') + ' -') : '';

      function setMeta(property, content) {
        var el = document.querySelector('meta[property="' + property + '"]');
        if (!el) {
          el = document.createElement('meta');
          el.setAttribute('property', property);
          document.head.appendChild(el);
        }
        el.setAttribute('content', content);
      }
      setMeta('og:title', title + (mainText ? ' · ' + mainText : ''));
      setMeta('og:description', 'Tap to join this plan in Plan Together');
      setMeta('og:image', ogImage);
      setMeta('og:url', window.location.href);

      function buildUniversalLinkUrl() {
        var params = ['scene=share_join'];
        ['title','mainText','date','time','tag','subtitle','sharerName','sharerId','sharerAvatar','taskId','taskType','ogImage','img'].forEach(function (key) {
          if (q[key]) params.push(encodeURIComponent(key) + '=' + encodeURIComponent(q[key]));
        });
        return CONFIG.landingBase + '?' + params.join('&');
      }

      function buildCustomSchemeUrl() {
        var params = ['scene=share_join'];
        ['title','mainText','date','time','tag','subtitle','sharerName','sharerId','sharerAvatar','taskId','taskType','ogImage','img'].forEach(function (key) {
          if (q[key]) params.push(encodeURIComponent(key) + '=' + encodeURIComponent(q[key]));
        });
        return 'haloutongxue://h5?' + params.join('&');
      }

      function copyToClipboard(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          return navigator.clipboard.writeText(text);
        }
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); } catch (e) {}
        document.body.removeChild(ta);
        return Promise.resolve();
      }

      function joinPlan() {
        var universalLinkUrl = buildUniversalLinkUrl();
        var customSchemeUrl = buildCustomSchemeUrl();
        var isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
        var storeUrl = isIOS ? CONFIG.iosStore : CONFIG.androidStore;

        copyToClipboard(universalLinkUrl).finally(function () {
          document.getElementById('hint').textContent =
            'Opening the app… If nothing happens, install from the store.';
        });

        var beforeOpen = Date.now();
        window.location.href = isIOS ? universalLinkUrl : customSchemeUrl;
        
        setTimeout(function () {
          var elapsed = Date.now() - beforeOpen;
          if (elapsed < 3000) {
            window.location.href = storeUrl;
          }
        }, 2500);
      }

      document.getElementById('btnJoin').addEventListener('click', joinPlan);
    })();
  </script>
</body>
</html>
