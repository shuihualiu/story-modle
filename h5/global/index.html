<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Join Plan Together</title>
  <meta name="description" content="Join a shared plan on Plan Together">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Plan Together">
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="./share-i18n.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #e5e5e5;
      min-height: 100dvh;
    }
    .card-wrap {
      width: 100vw;
      min-height: 100dvh;
      position: relative;
      background: #fff center top / cover no-repeat;
      overflow: hidden;
    }
    /* 设计稿基准 375×812：顶栏文案与 bell/clock/heart 图标对齐 */
    .card-header {
      position: absolute;
      top: 6.9%;
      left: 6.4%;
      right: 6.4%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 5;
      pointer-events: none;
      min-height: 32px;
    }
    .card-header.is-memorial {
      justify-content: center;
    }
    /* 日常类型：设计稿 375×812，左 100px，均斜向上 5° */
    .card-header.is-daily {
      top: 0;
      left: 0;
      right: 0;
      display: block;
      min-height: 0;
    }
    .card-header.is-daily .header-side {
      position: absolute;
      flex: none;
      width: auto;
      max-width: none;
      white-space: nowrap;
      overflow: visible;
      font-size: clamp(24px, 8.5vw, 36px);
      line-height: 1;
    }
    .card-header.is-daily #headerLeft {
      top: calc(100 / 812 * 100dvh);
      left: 6.4%;
      transform: rotate(-5deg);
      transform-origin: left bottom;
      text-align: left;
    }
    .card-header.is-daily #headerRight {
      top: calc(100 / 812 * 100dvh);
      right: 2.5%;
      left: auto;
      transform: rotate(-5deg);
      transform-origin: right bottom;
      text-align: right;
    }
    .header-side,
    .header-center {
      color: #fff;
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 700;
      line-height: 1.15;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.18);
      text-align: center;
      word-break: break-word;
    }
    .header-side {
      font-size: clamp(14px, 6.4vw, 24px);
      flex: 0 1 38%;
      width: 38%;
    }
    .header-center {
      font-size: clamp(15px, 6.9vw, 26px);
      max-width: 88%;
    }
    /* 设计稿顶栏为毛笔体，仅中文使用 Ma Shan Zheng */
    html[lang="zh"] .header-side,
    html[lang="zh"] .header-center {
      font-family: 'Ma Shan Zheng', 'Nunito', sans-serif;
      font-weight: 400;
    }
    .card-inner {
      position: relative;
      width: 100%;
      min-height: 100dvh;
      color: #61596a;
    }
    /* 插画：设计稿 top 140px / 812 ≈ 17.2% */
    .card-inner img {
      width: min(80vw, 300px);
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 17.2%;
      object-fit: contain;
      z-index: 2;
    }
    /* 主文案：设计稿 top 550px / 812 ≈ 67.7% */
    .card-title {
      position: absolute;
      left: 16px;
      right: 16px;
      top: 67.7%;
      text-align: center;
      font-size: 18px;
      font-weight: 500;
      margin: 0;
      line-height: 1.2;
    }
    .card-title .main-number {
      font-size: 32px;
      font-weight: 700;
    }
    /* 日期：主文案下方 18px */
    .card-datetime {
      position: absolute;
      left: 16px;
      right: 16px;
      top: calc(67.7% + 42px);
      text-align: center;
      font-size: 12px;
      color: #8a8a8a;
      margin: 0;
    }
    /* 按钮：设计稿 bottom 140px / 812 ≈ 17.2% */
    .btn-join {
      position: fixed;
      left: 50%;
      bottom: 17.2%;
      transform: translateX(-50%);
      width: min(64vw, 240px);
      height: 50px;
      padding: 0 12px;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      background: #0098ff;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-family: inherit;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-join span {
      display: block;
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .btn-join:active { opacity: 0.9; }
    .hint {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: calc(17.2% - 56px);
      text-align: center;
      font-size: 12px;
      color: #8a8a8a;
      z-index: 10;
    }
    html[dir="rtl"] .card-header {
      direction: ltr;
    }
  </style>
</head>
<body>
  <div class="card-wrap" id="cardWrap">
    <div class="card-header" id="cardHeader">
      <span class="header-side" id="headerLeft"></span>
      <span class="header-side" id="headerRight"></span>
      <span class="header-center" id="headerCenter" hidden></span>
    </div>
    <div class="card-inner">
      <img id="illustration" src="./default.png" alt="">
      <p class="card-title" id="headline"></p>
      <p class="card-datetime" id="datetime"></p>
    </div>
  </div>
  <button class="btn-join" id="btnJoin" type="button"><span id="btnJoinText">Join this plan</span></button>
  <p class="hint" id="hint"></p>
  <script>
    (function () {
      var CONFIG = {
        iosStore: 'https://apps.apple.com/app/idYOUR_APP_ID',
        androidStore: 'https://play.google.com/store/apps/details?id=com.haloutongxue.reminder',
        officialSite: 'https://global.haloutongxue.com',
        defaultOg: 'https://global.haloutongxue.com/h5/global/default-og.png',
        landingBase: 'https://global.haloutongxue.com/h5/global/index.html'
      };

      var PASSTHROUGH_KEYS = [
        'title', 'mainText', 'date', 'time', 'tag', 'subtitle',
        'sharerName', 'sharerId', 'sharerAvatar', 'taskId', 'taskType',
        'ogImage', 'img', 'country', 'lang'
      ];

      function getParams() {
        var params = {};
        var search = window.location.search.replace(/^\?/, '');
        if (search) {
          search.split('&').forEach(function (pair) {
            var idx = pair.indexOf('=');
            if (idx < 0) return;
            params[decodeURIComponent(pair.slice(0, idx))] =
              decodeURIComponent(pair.slice(idx + 1));
          });
        }
        var hash = window.location.hash.replace(/^#/, '');
        if (hash) {
          hash.split('&').forEach(function (pair) {
            var idx = pair.indexOf('=');
            if (idx < 0) return;
            var k = decodeURIComponent(pair.slice(0, idx));
            if (!params[k]) {
              params[k] = decodeURIComponent(pair.slice(idx + 1));
            }
          });
        }
        return params;
      }

      function emphasizeNumbers(text) {
        return text.replace(/(\d+(?:\.\d+)?)/g, '<span class="main-number">$1</span>');
      }

      function resolvePaperBg(taskType) {
        var type = (taskType || 'daily').toLowerCase();
        if (type === 'habit') return './paper_link1.png';
        if (type === 'memorial') return './paper_link2.png';
        return './paper_link.png';
      }

      function fitText(el, maxPx, minPx) {
        if (!el) return;
        var size = maxPx;
        el.style.fontSize = size + 'px';
        var guard = 0;
        var limit = el.clientWidth;
        if (!limit && el.parentElement) limit = el.parentElement.clientWidth;
        if (!limit) return;
        while (el.scrollWidth > limit && size > minPx && guard < 24) {
          size -= 1;
          el.style.fontSize = size + 'px';
          guard += 1;
        }
      }

      function fitButtonText(el, maxPx, minPx) {
        if (!el) return;
        var btn = el.parentElement;
        var size = maxPx;
        el.style.fontSize = size + 'px';
        var guard = 0;
        var limit = btn ? btn.clientWidth - 24 : el.clientWidth;
        while (el.scrollWidth > limit && size > minPx && guard < 24) {
          size -= 1;
          el.style.fontSize = size + 'px';
          guard += 1;
        }
      }

      function fitTextDaily(el, maxPx, minPx) {
        if (!el) return;
        var size = maxPx;
        el.style.fontSize = size + 'px';
        var guard = 0;
        var limit = window.innerWidth * 0.42;
        while (el.scrollWidth > limit && size > minPx && guard < 24) {
          size -= 1;
          el.style.fontSize = size + 'px';
          guard += 1;
        }
      }

      function applyHeader(copy, taskType) {
        var header = document.getElementById('cardHeader');
        var left = document.getElementById('headerLeft');
        var right = document.getElementById('headerRight');
        var center = document.getElementById('headerCenter');
        var type = (taskType || 'daily').toLowerCase();
        var isMemorial = type === 'memorial';
        var isDaily = type === 'daily';

        header.classList.remove('is-memorial', 'is-daily');
        left.style.fontSize = '';
        right.style.fontSize = '';
        center.style.fontSize = '';

        if (isMemorial) {
          header.classList.add('is-memorial');
          left.style.display = 'none';
          right.style.display = 'none';
          center.hidden = false;
          center.textContent = copy.headerCenter;
          fitText(center, 26, 13);
          return;
        }

        left.style.display = '';
        right.style.display = '';
        center.hidden = true;
        left.textContent = copy.headerLeft;
        right.textContent = copy.headerRight;

        if (isDaily) {
          header.classList.add('is-daily');
          fitTextDaily(left, 36, 18);
          fitTextDaily(right, 36, 18);
          return;
        }

        fitText(left, 24, 12);
        fitText(right, 24, 12);
      }

      var q = getParams();
      var taskType = (q.taskType || 'daily').toLowerCase();
      var lang = GlobalShareI18n.resolveLang(q.country, q.lang);
      var copy = GlobalShareI18n.stringsFor(lang, taskType);

      document.documentElement.lang = lang;
      if (copy.isRtl) {
        document.documentElement.dir = 'rtl';
      }
      document.title = copy.button;
      var metaDesc = document.querySelector('meta[name="description"]');
      if (metaDesc) metaDesc.setAttribute('content', copy.ogDesc);

      var title = q.title || 'Plan Together';
      var mainText = q.mainText || '';
      var date = q.date || '';
      var time = q.time || '';
      var img = q.img ? './' + q.img : './default.png';
      var ogImage = q.ogImage || CONFIG.defaultOg;

      var cardWrap = document.getElementById('cardWrap');
      cardWrap.style.backgroundImage = 'url("' + resolvePaperBg(taskType) + '")';
      applyHeader(copy, taskType);

      document.getElementById('illustration').src = img;
      document.getElementById('headline').innerHTML = emphasizeNumbers(
        (title + (mainText ? ' ' + mainText : '')).trim()
      );
      document.getElementById('datetime').textContent =
        date ? ('- ' + date + (time ? ' ' + time : '') + ' -') : '';

      var btnJoinText = document.getElementById('btnJoinText');
      btnJoinText.textContent = copy.button;
      fitButtonText(btnJoinText, 18, 11);

      function setMeta(property, content) {
        var el = document.querySelector('meta[property="' + property + '"]');
        if (!el) {
          el = document.createElement('meta');
          el.setAttribute('property', property);
          document.head.appendChild(el);
        }
        el.setAttribute('content', content);
      }
      setMeta('og:title', title + (mainText ? ' · ' + mainText : ''));
      setMeta('og:description', copy.ogDesc);
      setMeta('og:image', ogImage);
      setMeta('og:url', window.location.href);

      function buildShareUrl(base) {
        var params = ['scene=share_join'];
        PASSTHROUGH_KEYS.forEach(function (key) {
          if (q[key]) {
            params.push(
              encodeURIComponent(key) + '=' + encodeURIComponent(q[key])
            );
          }
        });
        return base + '?' + params.join('&');
      }

      function buildUniversalLinkUrl() {
        return buildShareUrl(CONFIG.landingBase);
      }

      function buildCustomSchemeUrl() {
        return buildShareUrl('haloutongxue://h5');
      }

      function copyToClipboard(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          return navigator.clipboard.writeText(text);
        }
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); } catch (e) {}
        document.body.removeChild(ta);
        return Promise.resolve();
      }

      function joinPlan() {
        var universalLinkUrl = buildUniversalLinkUrl();
        var customSchemeUrl = buildCustomSchemeUrl();
        var isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
        var storeUrl = isIOS ? CONFIG.iosStore : CONFIG.androidStore;

        copyToClipboard(universalLinkUrl).finally(function () {
          document.getElementById('hint').textContent = copy.hint;
        });

        var beforeOpen = Date.now();
        window.location.href = isIOS ? universalLinkUrl : customSchemeUrl;

        setTimeout(function () {
          if (Date.now() - beforeOpen < 3000) {
            window.location.href = storeUrl;
          }
        }, 2500);
      }

      document.getElementById('btnJoin').addEventListener('click', joinPlan);
    })();
  </script>
</body>
</html>
