<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Join Plan Together</title>
  <meta name="description" content="Join a shared plan on Plan Together">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Plan Together">
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="./share-i18n.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #e5e5e5;
      min-height: 100dvh;
    }
    .card-wrap {
      width: 100vw;
      min-height: 100dvh;
      position: relative;
      background: #fff center top / cover no-repeat;
      overflow: hidden;
    }
    /* 设计稿基准 375×812：顶栏文案与 bell/clock/heart 图标对齐 */
    .card-header {
      position: absolute;
      top: 6.9%;
      left: 6.4%;
      right: 6.4%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 5;
      pointer-events: none;
      min-height: 32px;
    }
    .card-header.is-memorial {
      top: calc(100 / 812 * 100dvh);
      left: 50%;
      right: auto;
      width: auto;
      max-width: 94vw;
      transform: translateX(-50%);
      justify-content: center;
      align-items: flex-end;
      min-height: 0;
      overflow: visible;
      padding: 0 12px;
    }
    .card-wrap.is-memorial {
      overflow-x: hidden;
      overflow-y: visible;
    }
    .card-header.is-memorial .header-center {
      display: inline-flex;
      align-items: baseline;
      justify-content: center;
      flex-wrap: nowrap;
      max-width: 100%;
      overflow: visible;
      white-space: nowrap;
      font-size: clamp(22px, 7.5vw, 32px);
      line-height: 1;
      word-break: keep-all;
      text-align: center;
    }
    .card-header.is-memorial .header-em-char {
      display: inline-block;
      line-height: 1;
    }
    /* 日常 / 习惯顶栏：设计稿 375×812，布局一致；习惯右侧文案斜向上 2° */
    .card-header.is-daily,
    .card-header.is-habit {
      top: 0;
      left: 0;
      right: 0;
      display: block;
      min-height: 0;
    }
    .card-header.is-daily .header-side,
    .card-header.is-habit .header-side {
      position: absolute;
      flex: none;
      width: auto;
      max-width: none;
      white-space: nowrap;
      overflow: visible;
      font-size: clamp(28px, 9.5vw, 42px);
      line-height: 1;
    }
    .card-header.is-daily #headerLeft,
    .card-header.is-habit #headerLeft {
      left: 6.4%;
      transform: rotate(-5deg);
      transform-origin: left bottom;
      text-align: left;
    }
    .card-header.is-daily #headerLeft {
      top: calc(80 / 812 * 100dvh);
    }
    .card-header.is-habit #headerLeft {
      top: calc(120 / 812 * 100dvh);
    }
    .card-header.is-daily #headerRight,
    .card-header.is-habit #headerRight {
      top: calc(140 / 812 * 100dvh);
      right: 2.5%;
      left: auto;
      transform-origin: right bottom;
      text-align: right;
    }
    .card-header.is-daily #headerRight {
      transform: rotate(-5deg);
    }
    .card-header.is-habit #headerRight {
      transform: rotate(-3deg);
    }
    .header-side,
    .header-center {
      color: #fff;
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 700;
      line-height: 1.15;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.18);
      text-align: center;
      word-break: break-word;
    }
    .header-side {
      font-size: clamp(14px, 6.4vw, 24px);
      flex: 0 1 38%;
      width: 38%;
    }
    .header-center {
      font-size: clamp(15px, 6.9vw, 26px);
      max-width: 88%;
    }
    /* 设计稿顶栏为毛笔体，仅中文使用 Ma Shan Zheng */
    html[lang="zh"] .header-side,
    html[lang="zh"] .header-center {
      font-family: 'Ma Shan Zheng', 'Nunito', sans-serif;
      font-weight: 400;
    }
    .card-inner {
      position: relative;
      width: 100%;
      min-height: 100dvh;
      color: #61596a;
    }
    /* 插画：设计稿 top 140px / 812 ≈ 17.2% */
    .card-inner img {
      width: min(80vw, 300px);
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 17.2%;
      object-fit: contain;
      z-index: 2;
    }
    /* 主文案：设计稿 top 550px / 812 ≈ 67.7%，最多 2 行省略 */
    .card-title {
      position: absolute;
      left: 16px;
      right: 16px;
      top: 67.7%;
      text-align: center;
      font-size: 18px;
      font-weight: 500;
      margin: 0;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
      text-overflow: ellipsis;
      word-break: break-word;
    }
    .card-title .main-number {
      font-size: 32px;
      font-weight: 700;
    }
    /* 日期：主文案下方 18px；标题超过 2 行时再下移 30px */
    .card-datetime {
      position: absolute;
      left: 16px;
      right: 16px;
      top: calc(67.7% + 42px);
      text-align: center;
      font-size: 12px;
      color: #8a8a8a;
      margin: 0;
    }
    body.title-two-lines .card-datetime {
      top: calc(67.7% + 72px);
    }
    /* 按钮：设计稿 bottom 140px / 812 ≈ 17.2%，下移 20px ≈ 120px */
    .btn-join {
      position: fixed;
      left: 50%;
      bottom: calc(17.2% - 20px);
      transform: translateX(-50%);
      width: min(64vw, 240px);
      height: 50px;
      padding: 0 12px;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      background: #0098ff;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-family: inherit;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-join span {
      display: block;
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .btn-join:active { opacity: 0.9; }
    body.title-two-lines .btn-join {
      bottom: calc(17.2% - 50px);
    }
    .hint {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: calc(17.2% - 56px);
      text-align: center;
      font-size: 12px;
      color: #8a8a8a;
      z-index: 10;
    }
    html[dir="rtl"] .card-header {
      direction: ltr;
    }
  </style>
</head>
<body>
  <div class="card-wrap" id="cardWrap">
    <div class="card-header" id="cardHeader">
      <span class="header-side" id="headerLeft"></span>
      <span class="header-side" id="headerRight"></span>
      <span class="header-center" id="headerCenter" hidden></span>
    </div>
    <div class="card-inner">
      <img id="illustration" src="./default.webp" alt="">
      <p class="card-title" id="headline"></p>
      <p class="card-datetime" id="datetime"></p>
    </div>
  </div>
  <button class="btn-join" id="btnJoin" type="button"><span id="btnJoinText">Join this plan</span></button>
  <p class="hint" id="hint"></p>
  <script>
    (function () {
      var CONFIG = {
        iosStore: 'https://apps.apple.com/app/idYOUR_APP_ID',
        androidStore: 'https://play.google.com/store/apps/details?id=com.haloutongxue.reminder',
        androidPackage: 'com.haloutongxue.reminder',
        customScheme: 'haloutongxue',
        customSchemeHost: 'h5',
        defaultOg: 'https://global.haloutongxue.com/h5/global/default-og.webp',
        landingBase: 'https://global.haloutongxue.com/h5/global/index.html',
        appOpenTimeoutMs: 2800,
        iosOpenTimeoutMs: 3200
      };

      var PASSTHROUGH_KEYS = [
        'title', 'mainText', 'date', 'time', 'tag', 'subtitle',
        'sharerName', 'sharerId', 'sharerAvatar', 'taskId', 'taskType',
        'ogImage', 'img', 'country', 'lang'
      ];

      function getParams() {
        var params = {};
        var search = window.location.search.replace(/^\?/, '');
        if (search) {
          search.split('&').forEach(function (pair) {
            var idx = pair.indexOf('=');
            if (idx < 0) return;
            params[decodeURIComponent(pair.slice(0, idx))] =
              decodeURIComponent(pair.slice(idx + 1));
          });
        }
        var hash = window.location.hash.replace(/^#/, '');
        if (hash) {
          hash.split('&').forEach(function (pair) {
            var idx = pair.indexOf('=');
            if (idx < 0) return;
            var k = decodeURIComponent(pair.slice(0, idx));
            if (!params[k]) {
              params[k] = decodeURIComponent(pair.slice(idx + 1));
            }
          });
        }
        return params;
      }

      function emphasizeNumbers(text) {
        return text.replace(/(\d+(?:\.\d+)?)/g, '<span class="main-number">$1</span>');
      }

      var ILLUSTRATION_DEFAULT = './default.webp';
      var IMAGE_FILE_RE = /^[a-zA-Z0-9_.-]+\.(webp|png)$/i;

      function normalizeIllustrationFileName(fileName) {
        var name = String(fileName || '').trim();
        if (!IMAGE_FILE_RE.test(name)) return '';
        // 海外静态资源已统一为 webp；兼容旧链接仍带 .png 的文件名
        return name.replace(/\.png$/i, '.webp');
      }

      function resolveIllustrationSrc(rawImg) {
        var name = normalizeIllustrationFileName(rawImg);
        return name ? './' + name : ILLUSTRATION_DEFAULT;
      }

      function normalizeOgImageUrl(url) {
        var value = String(url || '').trim();
        if (!value) return CONFIG.defaultOg;
        if (/\/h5\/global\//i.test(value)) {
          return value.replace(/\.png(\?|#|$)/i, '.webp$1');
        }
        return value;
      }

      function resolvePaperBg(taskType) {
        var type = (taskType || 'daily').toLowerCase();
        if (type === 'habit') return './paper_link1.webp';
        if (type === 'memorial') return './paper_link2.webp';
        return './paper_link.webp';
      }

      function fitText(el, maxPx, minPx) {
        if (!el) return;
        var size = maxPx;
        el.style.fontSize = size + 'px';
        var guard = 0;
        var limit = el.clientWidth;
        if (!limit && el.parentElement) limit = el.parentElement.clientWidth;
        if (!limit) return;
        while (el.scrollWidth > limit && size > minPx && guard < 24) {
          size -= 1;
          el.style.fontSize = size + 'px';
          guard += 1;
        }
      }

      function fitButtonText(el, maxPx, minPx) {
        if (!el) return;
        var btn = el.parentElement;
        var size = maxPx;
        el.style.fontSize = size + 'px';
        var guard = 0;
        var limit = btn ? btn.clientWidth - 24 : el.clientWidth;
        while (el.scrollWidth > limit && size > minPx && guard < 24) {
          size -= 1;
          el.style.fontSize = size + 'px';
          guard += 1;
        }
      }

      function syncTitleLayout() {
        var el = document.getElementById('headline');
        if (!el || !el.textContent.trim()) {
          document.body.classList.remove('title-two-lines');
          return;
        }
        if (!el.clientWidth) {
          requestAnimationFrame(syncTitleLayout);
          return;
        }
        // line-clamp:2 下 scrollHeight > clientHeight 表示内容超过 2 行被截断
        document.body.classList.toggle(
          'title-two-lines',
          el.scrollHeight > el.clientHeight + 1
        );
      }

      function fitTextDaily(el, maxPx, minPx) {
        if (!el) return;
        var size = maxPx;
        el.style.fontSize = size + 'px';
        var guard = 0;
        var limit = window.innerWidth * 0.42;
        while (el.scrollWidth > limit && size > minPx && guard < 24) {
          size -= 1;
          el.style.fontSize = size + 'px';
          guard += 1;
        }
      }

      function splitGraphemes(text) {
        if (typeof Intl !== 'undefined' && Intl.Segmenter) {
          var seg = new Intl.Segmenter(undefined, { granularity: 'grapheme' });
          return Array.from(seg.segment(text), function (s) { return s.segment; });
        }
        return Array.from(text);
      }

      function renderMemorialHeader(el, text) {
        if (!el) return;
        el.textContent = '';
        var chars = splitGraphemes(text);
        var n = chars.length;
        if (n === 0) return;
        if (n === 1) {
          el.textContent = text;
          fitText(el, 32, 13);
          return;
        }
        var mid = (n - 1) / 2;
        chars.forEach(function (ch, i) {
          var span = document.createElement('span');
          span.className = 'header-em-char';
          span.textContent = ch;
          var dist = mid > 0 ? Math.abs(i - mid) / mid : 0;
          var scale = 1 + 0.12 * (1 - dist);
          span.style.fontSize = (scale * 100).toFixed(1) + '%';
          el.appendChild(span);
        });
        var size = 32;
        var minPx = 13;
        var limit = window.innerWidth * 0.88;
        el.style.fontSize = size + 'px';
        var guard = 0;
        while (el.scrollWidth > limit && size > minPx && guard < 28) {
          size -= 1;
          el.style.fontSize = size + 'px';
          guard += 1;
        }
      }

      function applyHeader(copy, taskType) {
        var header = document.getElementById('cardHeader');
        var left = document.getElementById('headerLeft');
        var right = document.getElementById('headerRight');
        var center = document.getElementById('headerCenter');
        var type = (taskType || 'daily').toLowerCase();
        var isMemorial = type === 'memorial';
        var isDaily = type === 'daily';
        var isHabit = type === 'habit';

        var cardWrap = document.getElementById('cardWrap');
        header.classList.remove('is-memorial', 'is-daily', 'is-habit');
        if (cardWrap) cardWrap.classList.remove('is-memorial');
        left.style.fontSize = '';
        right.style.fontSize = '';
        center.style.fontSize = '';
        center.textContent = '';

        if (isMemorial) {
          header.classList.add('is-memorial');
          if (cardWrap) cardWrap.classList.add('is-memorial');
          left.style.display = 'none';
          right.style.display = 'none';
          center.hidden = false;
          renderMemorialHeader(center, copy.headerCenter);
          return;
        }

        left.style.display = '';
        right.style.display = '';
        center.hidden = true;
        left.textContent = copy.headerLeft;
        right.textContent = copy.headerRight;

        if (isDaily) {
          header.classList.add('is-daily');
          fitTextDaily(left, 42, 18);
          fitTextDaily(right, 42, 18);
          return;
        }

        if (isHabit) {
          header.classList.add('is-habit');
          fitTextDaily(left, 42, 18);
          fitTextDaily(right, 42, 18);
          return;
        }

        fitText(left, 24, 12);
        fitText(right, 24, 12);
      }

      var q = getParams();
      var taskType = (q.taskType || 'daily').toLowerCase();
      var lang = GlobalShareI18n.resolveLang(q.country, q.lang);
      var copy = GlobalShareI18n.stringsFor(lang, taskType);

      document.documentElement.lang = lang;
      if (copy.isRtl) {
        document.documentElement.dir = 'rtl';
      }
      document.title = copy.button;
      var metaDesc = document.querySelector('meta[name="description"]');
      if (metaDesc) metaDesc.setAttribute('content', copy.ogDesc);

      var title = q.title || 'Plan Together';
      var mainText = q.mainText || '';
      var date = q.date || '';
      var time = q.time || '';
      var ogImage = normalizeOgImageUrl(q.ogImage || CONFIG.defaultOg);

      var cardWrap = document.getElementById('cardWrap');
      cardWrap.style.backgroundImage = 'url("' + resolvePaperBg(taskType) + '")';
      applyHeader(copy, taskType);

      var illustrationEl = document.getElementById('illustration');
      illustrationEl.onerror = function () {
        if (illustrationEl.src.indexOf('default.webp') >= 0) return;
        illustrationEl.onerror = null;
        illustrationEl.src = ILLUSTRATION_DEFAULT;
      };
      illustrationEl.src = resolveIllustrationSrc(q.img);
      document.getElementById('headline').innerHTML = emphasizeNumbers(
        (title + (mainText ? ' ' + mainText : '')).trim()
      );
      document.getElementById('datetime').textContent =
        date ? ('- ' + date + (time ? ' ' + time : '') + ' -') : '';
      requestAnimationFrame(syncTitleLayout);
      window.addEventListener('resize', syncTitleLayout);

      var btnJoinText = document.getElementById('btnJoinText');
      btnJoinText.textContent = copy.button;
      fitButtonText(btnJoinText, 18, 11);

      function setMeta(property, content) {
        var el = document.querySelector('meta[property="' + property + '"]');
        if (!el) {
          el = document.createElement('meta');
          el.setAttribute('property', property);
          document.head.appendChild(el);
        }
        el.setAttribute('content', content);
      }
      setMeta('og:title', title + (mainText ? ' · ' + mainText : ''));
      setMeta('og:description', copy.ogDesc);
      setMeta('og:image', ogImage);
      setMeta('og:url', window.location.href);

      function appendTaskDetailParams(params) {
        var reserved = {
          scene: true,
          title: true,
          mainText: true,
          date: true,
          time: true,
          tag: true,
          subtitle: true,
          sharerName: true,
          sharerId: true,
          sharerAvatar: true,
          taskId: true,
          taskType: true,
          img: true,
          ogImage: true,
          country: true,
          lang: true
        };

        for (var key in q) {
          if (!Object.prototype.hasOwnProperty.call(q, key)) continue;
          if (reserved[key]) continue;
          var lowerKey = String(key).toLowerCase();
          if (lowerKey === 'created_at' || lowerKey === 'updated_at') continue;
          var val = q[key];
          if (val === undefined || val === null || val === '') continue;
          params.push(
            encodeURIComponent(key) + '=' + encodeURIComponent(val)
          );
        }
      }

      function buildShareUrl(base) {
        var params = ['scene=share_join'];
        PASSTHROUGH_KEYS.forEach(function (key) {
          if (q[key]) {
            params.push(
              encodeURIComponent(key) + '=' + encodeURIComponent(q[key])
            );
          }
        });
        appendTaskDetailParams(params);
        return base + '?' + params.join('&');
      }

      function buildUniversalLinkUrl() {
        return buildShareUrl(CONFIG.landingBase);
      }

      function buildCustomSchemeUrl() {
        return buildShareUrl(
          CONFIG.customScheme + '://' + CONFIG.customSchemeHost
        );
      }

      function detectPlatform() {
        var ua = navigator.userAgent || '';
        return {
          isIOS: /iPhone|iPad|iPod/i.test(ua),
          isAndroid: /Android/i.test(ua)
        };
      }

      function hasValidIosStoreUrl() {
        return CONFIG.iosStore.indexOf('YOUR_APP_ID') < 0;
      }

      function resolveStoreUrl(platform) {
        if (platform.isIOS) {
          return hasValidIosStoreUrl() ? CONFIG.iosStore : null;
        }
        return CONFIG.androidStore;
      }

      function buildAndroidIntentUrl(customSchemeUrl, fallbackStoreUrl) {
        var pathAndQuery = customSchemeUrl.replace(
          new RegExp('^' + CONFIG.customScheme + '://'),
          ''
        );
        return (
          'intent://' + pathAndQuery +
          '#Intent;scheme=' + CONFIG.customScheme +
          ';package=' + CONFIG.androidPackage +
          ';S.browser_fallback_url=' + encodeURIComponent(fallbackStoreUrl) +
          ';end'
        );
      }

      function openCustomSchemeFromGesture(url) {
        // iOS Safari 必须在用户点击的同一调用栈内同步跳转；iframe 已无法可靠唤端。
        window.location.href = url;
      }

      /**
       * 从 H5 落地页内唤起 App：必须用 custom scheme / Android Intent。
       * 同页再跳 Universal Link 只会刷新当前页，且 iOS 同域 JS 无法打开 App。
       * 未安装时用 visibility 检测 + 商店兜底（Android Intent 自带 fallback）。
       */
      function openAppOrStore(customSchemeUrl, storeUrl, platform) {
        var appOpened = false;
        var timer = null;
        var timeoutMs = platform.isIOS
          ? CONFIG.iosOpenTimeoutMs
          : CONFIG.appOpenTimeoutMs;

        function markAppOpened() {
          appOpened = true;
        }

        function cleanup() {
          document.removeEventListener('visibilitychange', onVisibilityChange);
          window.removeEventListener('pagehide', markAppOpened);
          window.removeEventListener('blur', markAppOpened);
          if (timer) {
            clearTimeout(timer);
            timer = null;
          }
        }

        function onVisibilityChange() {
          if (document.hidden) markAppOpened();
        }

        function onOpenTimeout() {
          cleanup();
          if (appOpened) return;
          if (storeUrl) {
            window.location.replace(storeUrl);
          }
        }

        document.addEventListener('visibilitychange', onVisibilityChange);
        window.addEventListener('pagehide', markAppOpened);
        window.addEventListener('blur', markAppOpened);

        timer = setTimeout(onOpenTimeout, timeoutMs);

        if (platform.isAndroid) {
          window.location.href = buildAndroidIntentUrl(
            customSchemeUrl,
            storeUrl || CONFIG.androidStore
          );
          return;
        }

        if (platform.isIOS) {
          openCustomSchemeFromGesture(customSchemeUrl);
          return;
        }

        cleanup();
        if (storeUrl) {
          window.location.href = storeUrl;
        }
      }

      function copyToClipboard(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          return navigator.clipboard.writeText(text);
        }
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); } catch (e) {}
        document.body.removeChild(ta);
        return Promise.resolve();
      }

      var joining = false;

      function joinPlan() {
        if (joining) return;
        joining = true;

        var customSchemeUrl = buildCustomSchemeUrl();
        var universalLinkUrl = buildUniversalLinkUrl();
        var platform = detectPlatform();
        var storeUrl = resolveStoreUrl(platform);
        var btn = document.getElementById('btnJoin');
        var hintEl = document.getElementById('hint');
        var resetMs = (platform.isIOS
          ? CONFIG.iosOpenTimeoutMs
          : CONFIG.appOpenTimeoutMs) + 800;

        if (hintEl) hintEl.textContent = copy.hint;

        // 必须在 click 同步栈内先尝试唤端，再异步写剪贴板，避免 iOS 丢失用户手势。
        openAppOrStore(customSchemeUrl, storeUrl, platform);

        copyToClipboard(universalLinkUrl).catch(function () {});

        setTimeout(function () {
          joining = false;
          if (btn) btn.disabled = false;
        }, resetMs);
      }

      document.getElementById('btnJoin').addEventListener('click', joinPlan);
    })();
  </script>
</body>
</html>
